services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demo_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: demo_app
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
